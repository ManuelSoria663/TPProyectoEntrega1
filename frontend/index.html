<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Eventos</title>

    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header class="header">
        <h1>Catálogo de Eventos</h1>
    </header>

    <main>
        <section class="catalogo">

            <div class="card-evento">
                <img src="https://picsum.photos/300/180?1" alt="Evento">

                <div class="info-evento">
                    <h2>Concierto de Rock</h2>
                    <p>15 Junio 2026</p>
                    <p>Estadio Central</p>

                    <button onclick="irEvento()">Ver Evento</button>
                </div>
            </div>

            <div class="card-evento">
                <img src="https://picsum.photos/300/180?2" alt="Evento">

                <div class="info-evento">
                    <h2>Festival Electrónico</h2>
                    <p>20 Julio 2026</p>
                    <p>Predio Municipal</p>

                    <button onclick="irEvento()">Ver Evento</button>
                </div>
            </div>

            <div class="card-evento">
                <img src="https://picsum.photos/300/180?3" alt="Evento">

                <div class="info-evento">
                    <h2>Show Internacional</h2>
                    <p>12 Agosto 2026</p>
                    <p>Teatro Principal</p>

                    <button onclick="irEvento()">Ver Evento</button>
                </div>
            </div>

        </section>
    </main>

    <script>
        function irEvento() {
            window.location.href = "html/evento.html";
        }
    </script>

</body>
</html>
